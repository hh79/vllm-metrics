# vLLM Metrics Collector Configuration
#
# List all vLLM server instances you want to monitor.
# Each server must have a unique name and reachable URL.
#
# The daemon scrapes /metrics on each server, splits statistics
# by model_name label, and stores them for long-term reporting.

servers:
  - name: spark1
    url: http://192.168.1.198:8000

  - name: atom1
    url: http://192.168.1.227:8000

# Collection interval in seconds (default: 60)
interval: 60

# Database path (default: ~/.vllm-metrics.db)
database: ~/.vllm-metrics.db

# How long to keep raw snapshots before pruning to daily rollups (days)
# Set to 0 to keep raw data forever (recommended for per-hour graphs).
raw_retention_days: 0
